{% extends 'base.html' %}

{% block content %}
<div class="max-w-4xl mx-auto py-10">
    <h1 class="text-2xl font-bold">Рӯйхати суратҳо</h1>
    <div class="grid grid-cols-3 gap-4 mt-6">
        {% for img in propertyimages %}
            <div class="border p-2">
                <img src="{{ img.image.url }}" class="w-full h-40 object-cover">
                <p>{{ img.property.title }}</p>
            </div>
        {% endfor %}
    </div>
</div>
{% endblock %}
