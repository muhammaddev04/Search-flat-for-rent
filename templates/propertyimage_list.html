{% extends 'base.html' %}

{% block content %}
<div class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 py-14">
    <h1 class="font-display text-2xl sm:text-3xl font-bold text-ink dark:text-white border-b-2 border-gold inline-block pb-2 mb-8">Рӯйхати суратҳо</h1>
    <div class="grid grid-cols-2 sm:grid-cols-3 gap-5">
        {% for img in propertyimages %}
            <div class="card-hover bg-white dark:bg-white/5 rounded-2xl border border-ink/5 dark:border-white/10 shadow-sm overflow-hidden">
                <div class="img-zoom h-40 overflow-hidden">
                    <img src="{{ img.image.url }}" class="w-full h-full object-cover">
                </div>
                <p class="p-3 text-sm font-medium text-ink dark:text-gray-200 truncate">{{ img.property.title }}</p>
            </div>
        {% empty %}
            <div class="col-span-2 sm:col-span-3 text-center py-16 bg-white dark:bg-white/5 rounded-2xl border border-dashed border-ink/10 dark:border-white/10">
                <i class="fa-regular fa-images text-4xl text-stone/40 dark:text-gray-600 mb-4"></i>
                <p class="text-stone dark:text-gray-400">Ҳанӯз сурате илова нашудааст.</p>
            </div>
        {% endfor %}
    </div>
</div>
{% endblock %}
