
{% extends 'base.html' %}
{% block content %}

<div class="max-w-md mx-auto bg-white dark:bg-white/5 p-8 rounded-3xl shadow-lg border border-gray-100 dark:border-white/10 mt-12">
    <h2 data-lang="reg_h2" class="font-display text-3xl font-extrabold text-ink dark:text-white text-center mb-6">Сабти ном</h2>

    {% if error %}
        <div class="bg-red-50 text-red-600 p-3 rounded-xl text-sm mb-4 font-medium text-center border border-red-200">
            {{ error }}
        </div>
    {% endif %}

    <form method="POST" class="space-y-4">
        {% csrf_token %}
        <div>
            <label class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-1">Username</label>
            <input type="text" name="username" required class="w-full px-4 py-2.5 border border-gray-300 dark:border-white/10 dark:bg-white/5 dark:text-white rounded-xl focus:ring-2 focus:ring-coral focus:border-coral focus:outline-none">
        </div>
        <div>
            <label class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-1">Email</label>
            <input type="email" name="email" required class="w-full px-4 py-2.5 border border-gray-300 dark:border-white/10 dark:bg-white/5 dark:text-white rounded-xl focus:ring-2 focus:ring-coral focus:border-coral focus:outline-none">
        </div>
        <div>
            <label class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-1">Phone Number</label>
            <input type="number" name="phone_number" required class="w-full px-4 py-2.5 border border-gray-300 dark:border-white/10 dark:bg-white/5 dark:text-white rounded-xl focus:ring-2 focus:ring-coral focus:border-coral focus:outline-none">
        </div>
        <div>
            <label data-lang="reg_role" class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-1">Нақш (Статус)</label>
            <select name="role" class="w-full px-4 py-2.5 border border-gray-300 dark:border-white/10 dark:bg-white/5 dark:text-white rounded-xl focus:ring-2 focus:ring-coral focus:border-coral focus:outline-none">
                <option value="tenant" class="text-gray-900">Tenant (Иҷорагир)</option>
                <option value="landlord" class="text-gray-900">Landlord (Соҳибмулк)</option>
            </select>
        </div>
        <div>
            <label data-lang="login_pass" class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-1">Парол</label>
            <input type="password" name="password1" required class="w-full px-4 py-2.5 border border-gray-300 dark:border-white/10 dark:bg-white/5 dark:text-white rounded-xl focus:ring-2 focus:ring-coral focus:border-coral focus:outline-none">
        </div>
        <div>
            <label data-lang="reg_pass2" class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-1">Татбиқи парол</label>
            <input type="password" name="password2" required class="w-full px-4 py-2.5 border border-gray-300 dark:border-white/10 dark:bg-white/5 dark:text-white rounded-xl focus:ring-2 focus:ring-coral focus:border-coral focus:outline-none">
        </div>
        <button type="submit" data-lang="reg_btn" class="gradient-btn glow-shadow w-full text-white font-display font-bold py-3 rounded-xl transition">Сабти ном</button>
    </form>
</div>

{% endblock %}
