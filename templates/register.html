{% extends 'base.html' %}
{% block content %}

<div class="max-w-md mx-auto bg-white p-8 rounded-2xl shadow-lg border border-gray-100 mt-12">
    <h2 data-lang="reg_h2" class="text-3xl font-bold text-gray-900 text-center mb-6">Сабти ном</h2>

    {% if error %}
        <div class="bg-red-50 text-red-600 p-3 rounded-xl text-sm mb-4 font-medium text-center border border-red-200">
            {{ error }}
        </div>
    {% endif %}

    <form method="POST" class="space-y-4">
        {% csrf_token %}
        <div>
            <label class="block text-sm font-semibold text-gray-700 mb-1">Username</label>
            <input type="text" name="username" required class="w-full px-4 py-2.5 border border-gray-300 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:outline-none">
        </div>
        <div>
            <label class="block text-sm font-semibold text-gray-700 mb-1">Email</label>
            <input type="email" name="email" required class="w-full px-4 py-2.5 border border-gray-300 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:outline-none">
        </div>
        <div>
            <label class="block text-sm font-semibold text-gray-700 mb-1">Phone Number</label>
            <input type="number" name="phone_number" required class="w-full px-4 py-2.5 border border-gray-300 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:outline-none">
        </div>
        <div>
            <label data-lang="reg_role" class="block text-sm font-semibold text-gray-700 mb-1">Нақш (Статус)</label>
            <select name="role" class="w-full px-4 py-2.5 border border-gray-300 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:outline-none">
                <option value="tenant">Tenant (Иҷорагир)</option>
                <option value="landlord">Landlord (Соҳибмулк)</option>
            </select>
        </div>
        <div>
            <label data-lang="login_pass" class="block text-sm font-semibold text-gray-700 mb-1">Парол</label>
            <input type="password" name="password1" required class="w-full px-4 py-2.5 border border-gray-300 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:outline-none">
        </div>
        <div>
            <label data-lang="reg_pass2" class="block text-sm font-semibold text-gray-700 mb-1">Татбиқи парол</label>
            <input type="password" name="password2" required class="w-full px-4 py-2.5 border border-gray-300 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:outline-none">
        </div>
        <button type="submit" data-lang="reg_btn" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 rounded-xl transition">Сабти ном</button>
    </form>
</div>

<script>
    Object.assign(translations.tg, { reg_h2: "Сабти ном", reg_role: "Нақш (Мақсад)", reg_pass2: "Такрори парол", reg_btn: "Сабти ном" });
    Object.assign(translations.ru, { reg_h2: "Регистрация", reg_role: "Роль (Статус)", reg_pass2: "Повторите пароль", reg_btn: "Зарегистрироваться" });
    Object.assign(translations.en, { reg_h2: "Create Account", reg_role: "I am a...", reg_pass2: "Confirm Password", reg_btn: "Register" });
</script>

{% endblock %}
