{% extends 'base.html' %}
{% block content %}

<div class="max-w-md mx-auto bg-white p-8 rounded-2xl shadow-md border border-gray-100 mt-16">
    <h2 data-lang="img_add_btn" class="text-xl font-bold text-gray-900 mb-6 text-center">+ Иловаи сурат</h2>
    
    <form method="POST" enctype="multipart/form-data" class="space-y-5">
    {% csrf_token %}
    
    <div>
        <label class="block text-sm font-semibold text-gray-700 mb-1" data-lang="select_prop">Интихоби амвол</label>
        
        <select name="property" class="w-full px-3 py-2 text-gray-800 bg-gray-50 rounded-xl border border-gray-100 focus:outline-none focus:border-indigo-500 text-sm">
            <option value="">-- Интихоб кунед --</option>
            {% for prop in propertys %}
                <option value="{{ prop.pk }}">{{ prop.title }}</option>
            {% endfor %}
        </select>
    </div>

    <div>
        <label class="block text-sm font-semibold text-gray-700 mb-1" data-lang="select_file">Суратро интихоб кунед</label>
        <input type="file" name="image" required class="w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-xl file:border-0 file:text-sm file:font-semibold file:bg-indigo-50 file:text-indigo-600 hover:file:bg-indigo-100 cursor-pointer">
    </div>

    {% if error %}
        <p class="text-red-500 text-sm">{{ error }}</p>
    {% endif %}

    <button type="submit" data-lang="save_btn" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-2.5 rounded-xl transition">
        Бор кардан
    </button>
</form>
</div>

{% endblock %}
