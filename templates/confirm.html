{% extends 'base.html' %}
{% block content %}

<div class="max-w-md mx-auto bg-white p-8 rounded-2xl shadow-lg border border-gray-100 mt-20 text-center">
    <div class="w-16 h-16 bg-indigo-100 text-indigo-600 rounded-full flex items-center justify-center mx-auto mb-4 text-2xl">
        <i class="fa-regular fa-envelope-open"></i>
    </div>
    
    <h2 data-lang="conf_h2" class="text-2xl font-bold text-gray-900 mb-2">Тасдиқи почтаи электронӣ</h2>
    <p data-lang="conf_sub" class="text-gray-500 text-sm mb-6">Лутфан коди ба почтаи шумо фиристодашударо ворид кунед.</p>

    {% if error %}
        <div class="bg-red-50 text-red-600 p-3 rounded-xl text-sm mb-4 font-medium border border-red-200">
            {{ error }}
        </div>
    {% endif %}

    <form method="POST" action="{% url 'confirm_email' %}" class="space-y-4">
        {% csrf_token %}
        <input type="hidden" name="email" value="{{ user.email }}">
        
        <div>
            <input type="text" name="code" maxlength="6" placeholder="******" required 
                   class="w-full text-center text-2xl tracking-widest px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:outline-none font-bold">
        </div>
        
        <button type="submit" data-lang="conf_btn" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 rounded-xl transition">
            Тасдиқ кардан
        </button>
    </form>
</div>

{% endblock %}
