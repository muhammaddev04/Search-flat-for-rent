{% extends 'base.html' %}
{% block content %}

<div class="max-w-md mx-auto bg-white dark:bg-white/5 p-8 rounded-3xl shadow-soft border border-ink/5 dark:border-white/10 mt-20 text-center">
    <div class="w-16 h-16 bg-red-50 dark:bg-red-500/10 text-red-500 rounded-full flex items-center justify-center mx-auto mb-4 text-2xl">
        <i class="fa-solid fa-triangle-exclamation"></i>
    </div>
    <h2 data-lang="delete_title" class="font-display text-xl font-bold text-ink dark:text-white mb-2">Тасдиқи несткунӣ</h2>
    <p data-lang="delete_sub" class="text-stone dark:text-gray-400 text-sm mb-6">Оё шумо мутмаин ҳастед, ки ин эълонро нест кардан мехоҳед? Ин амалро барқарор карда намешавад.</p>

    <form method="POST" class="flex gap-4">
        {% csrf_token %}
        <button type="submit" data-lang="confirm_btn" class="flex-grow bg-red-500 hover:bg-red-600 text-white font-display font-bold py-2.5 rounded-xl transition">Нест кардан</button>
        <a href="{% url 'property_list' %}" data-lang="cancel_btn" class="flex-grow bg-cream dark:bg-white/10 hover:bg-ink/5 dark:hover:bg-white/20 text-ink/80 dark:text-gray-200 font-display font-semibold py-2.5 rounded-xl transition flex items-center justify-center text-sm">Бекор кардан</a>
    </form>
</div>

{% endblock %}
