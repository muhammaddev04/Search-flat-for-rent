{% extends 'base.html' %}
{% block content %}

<div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 py-14">
    <div class="flex justify-between items-center mb-8 flex-wrap gap-3">
        <h2 data-lang="my_prop_title" class="font-display text-2xl sm:text-3xl font-bold text-ink dark:text-white border-b-2 border-gold inline-block pb-2">Эълонҳои ман</h2>
        <a href="{% url 'create_property' %}" data-lang="nav_add" class="gradient-btn text-white px-5 py-2.5 rounded-xl text-sm font-display font-semibold transition">
            Эълон +
        </a>
    </div>

    <div class="bg-white dark:bg-white/5 rounded-2xl border border-ink/5 dark:border-white/10 shadow-soft overflow-hidden overflow-x-auto">
        <table class="w-full text-left border-collapse">
            <thead>
                <tr class="bg-cream dark:bg-white/5 border-b border-ink/5 dark:border-white/10 text-stone dark:text-gray-400 text-sm font-semibold">
                    <th class="p-4" data-lang="table_title">Ном</th>
                    <th class="p-4" data-lang="table_price">Нарх</th>
                    <th class="p-4" data-lang="table_city">Шаҳр</th>
                    <th class="p-4" data-lang="label_district">Ноҳия</th>
                    <th class="p-4 text-right" data-lang="table_actions">Амалҳо</th>
                </tr>
            </thead>
            <tbody class="divide-y divide-ink/5 dark:divide-white/10 text-ink/80 dark:text-gray-300">
                {% for property in propertys %}
                <tr class="hover:bg-cream/60 dark:hover:bg-white/5 transition">
                    <td class="p-4 font-semibold text-ink dark:text-white">{{ property.title }}</td>
                    <td class="p-4 text-emerald dark:text-gold font-display font-bold">{{ property.price }} TJS</td>
                    <td class="p-4 text-sm text-stone dark:text-gray-400">{{ property.city }}</td>
                    <td class="p-4 text-sm text-stone dark:text-gray-400">{{ property.district }}</td>
                    <td class="p-4 text-right space-x-3">
                        <a href="{% url 'update_property' property.pk %}" class="text-emerald dark:text-gold hover:opacity-70 font-medium text-sm" title="Таҳрир"><i class="fa-regular fa-pen-to-square"></i></a>
                        <a href="{% url 'delete_property' property.pk %}" class="text-red-500 hover:text-red-700 font-medium text-sm" title="Нест кардан"><i class="fa-regular fa-trash-can"></i></a>
                    </td>
                </tr>
                {% empty %}
                    <tr>
                        <td colspan="5" class="p-10 text-center text-stone dark:text-gray-500" data-lang="no_properties">Ҳеҷ амволе ёфт нашуд.</td>
                    </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>

{% endblock %}
